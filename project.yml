# project.yml — генерация настоящего Xcode-проекта с app-таргетом.
#
# SwiftPM сам .app-бандл собрать не умеет, поэтому правильный способ —
# Xcode-проект. Чтобы не держать .xcodeproj в репозитории, он генерируется:
#
#   brew install xcodegen
#   xcodegen                 # создаст Sudrf.xcodeproj рядом с этим файлом
#   open Sudrf.xcodeproj     # схема Sudrf → ⌘R
#
# App-таргет компилирует Sources/SudrfApp и линкует библиотеку SudrfKit
# из этого же пакета (локальная SPM-зависимость). Бандл получает Info.plist
# с LSMinimumSystemVersion 26.0 — Liquid Glass включается штатно.

name: Sudrf
options:
  bundleIdPrefix: ru.sudrf
  deploymentTarget:
    macOS: "26.0"

packages:
  SudrfKit:
    path: .

targets:
  Sudrf:
    type: application
    platform: macOS
    sources:
      - path: Sources/SudrfApp
      - path: Assets.xcassets
    dependencies:
      - package: SudrfKit
        product: SudrfKit
      # CaptchaSolver — отдельный продукт того же пакета
      # (см. `products:` в `Package.swift`). Без этой строки xcodegen
      # не пробрасывает зависимость из SwiftPM target'а
      # `SudrfApp` (`dependencies: [..., "CaptchaSolver"]`) в
      # сгенерированный `.xcodeproj`, и Swift-импорты
      # `import CaptchaSolver` в `Sources/SudrfApp/*.swift` ломаются
      # с «Unable to resolve module dependency: 'CaptchaSolver'».
      - package: SudrfKit
        product: CaptchaSolver
    info:
      path: Generated/Sudrf-Info.plist
      properties:
        CFBundleName: Sudrf
        CFBundleDisplayName: Sudrf
        # Публичная версия следует SemVer внутри альфа-канала (например,
        # Alpha 0.37.0); CURRENT_PROJECT_VERSION — монотонный номер билда.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "26.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        CFBundleDevelopmentRegion: ru
        LSApplicationCategoryType: public.app-category.productivity
        # ATS-исключения для доменов судов: у части «винтажных» серверов
        # (Воронеж и др.) TLS не дотягивает до требований App Transport
        # Security (TLS ≥1.2, forward secrecy) — рукопожатие рвалось с -1200,
        # хотя Safari (не подчиняется ATS) те же суды открывает. Insecure
        # HTTP разрешён как задел под http-фолбэк (сейчас не используется).
        NSAppTransportSecurity:
          NSExceptionDomains:
            sudrf.ru:
              NSIncludesSubdomains: true
              NSExceptionMinimumTLSVersion: TLSv1.2
              NSExceptionRequiresForwardSecrecy: false
              NSExceptionAllowsInsecureHTTPLoads: true
            msudrf.ru:
              NSIncludesSubdomains: true
              NSExceptionMinimumTLSVersion: TLSv1.2
              NSExceptionRequiresForwardSecrecy: false
              NSExceptionAllowsInsecureHTTPLoads: true
            mos-gorsud.ru:
              NSIncludesSubdomains: true
              NSExceptionRequiresForwardSecrecy: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.sudrf.app
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        # Публичная версия и внутренний билд; Info.plist ссылается на них.
        MARKETING_VERSION: "0.40.3"
        CURRENT_PROJECT_VERSION: "83"
        # Дублирует ключ Info.plist — чтобы General → App Category показывал «Productivity».
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES

# Shared-схема app-бандла. Без неё Xcode после регенерации делает активной
# авто-схему executable-продукта пакета (SudrfApp) — «Run» запускает голый
# бинарник (иконка «exec», без Liquid Glass). Запускать нужно схему «Sudrf».
schemes:
  Sudrf:
    build:
      targets:
        Sudrf: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
